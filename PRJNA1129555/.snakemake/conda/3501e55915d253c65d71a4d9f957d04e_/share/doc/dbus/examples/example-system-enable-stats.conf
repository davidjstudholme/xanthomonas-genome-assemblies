<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>

  <!-- If the Stats interface was enabled at compile-time, only root may use it.
       Replace USERNAME and copy this file in /data/djs217/PROJECTS/PRJNA1129555/.snakemake/conda/3501e55915d253c65d71a4d9f957d04e_/etc/dbus-1/system.d/
       if you want to enable other privileged users to view statistics and
       debug info -->

  <policy user="USERNAME">
    <allow send_destination="org.freedesktop.DBus"
           send_interface="org.freedesktop.DBus.Debug.Stats"/>
  </policy>

</busconfig>
